<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions - NaijaPay</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/toast.css">
</head>
<body class="dashboard-page">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="dashboard.html" class="sidebar-logo">NaijaPay</a>
      <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Main</div>
        <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> <span>Dashboard</span></a>
        <a href="credentials.html" class="nav-link"><i class="fas fa-id-card"></i> <span>Credentials</span></a>
        <a href="transactions.html" class="nav-link active"><i class="fas fa-exchange-alt"></i> <span>Transactions</span></a>
        <a href="notifications.html" class="nav-link"><i class="fas fa-bell"></i> <span>Notifications</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Finance</div>
        <a href="withdrawal.html" class="nav-link"><i class="fas fa-money-bill-wave"></i> <span>Withdrawals</span></a>
        <a href="giftcards.html" class="nav-link"><i class="fas fa-gift"></i> <span>Gift Cards</span></a>
        <a href="referrals.html" class="nav-link"><i class="fas fa-users"></i> <span>Referrals</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Account</div>
        <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> <span>Settings</span></a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> <span>Profile</span></a>
        <a href="#" class="nav-link" onclick="logout();return false;"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-preview">
        <div class="user-avatar" id="sidebarAvatar"></div>
        <div class="user-info">
          <div class="user-name" id="sidebarName">--</div>
          <div class="user-role">User</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="dashboard-header">
      <div class="header-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
        <h1 class="header-title">Transaction History</h1>
      </div>
      <div class="header-actions">
        <a href="notifications.html" class="header-btn"><i class="fas fa-bell"></i></a>
        <button class="theme-toggle" title="Toggle theme"></button>
        <div class="header-avatar" id="headerAvatar"></div>
        <button class="header-btn" onclick="logout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>
    <div class="dashboard-content">
      <div class="content-card">
        <div class="content-card-header">
          <h3 class="content-card-title">All Transactions</h3>
          <div style="display:flex;gap:var(--space-md)">
            <select class="form-select" id="typeFilter" style="min-width:140px">
              <option value="">All Types</option>
              <option value="withdrawal">Withdrawals</option>
              <option value="referral_bonus">Referrals</option>
              <option value="adjustment">Adjustments</option>
            </select>
            <select class="form-select" id="statusFilter" style="min-width:140px">
              <option value="">All Status</option>
              <option value="completed">Completed</option>
              <option value="pending">Pending</option>
              <option value="failed">Failed</option>
            </select>
          </div>
        </div>
        <div class="content-card-body">
          <div id="transactionsContainer">
            <div class="empty-state">
              <div class="empty-state-icon"><i class="fas fa-exchange-alt"></i></div>
              <h3>No Transactions</h3>
              <p>Your transaction history will appear here.</p>
            </div>
          </div>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/avatar.js"></script>
  <script src="js/transactions.js"></script>
  <script>
    if (!requireAuth()) {};
    initSidebar();
    updateUserHeader();
    renderAllAvatars();
    setActiveNavLink();
    initTransactionsPage();
  </script>
  <script src="js/theme-toggle.js"></script>
</body>
</html>
