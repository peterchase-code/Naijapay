<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - NaijaPay</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/toast.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-decoration auth-decoration-1"></div>
    <div class="auth-decoration auth-decoration-2"></div>
    <div class="auth-decoration auth-decoration-3"></div>
    
    <div class="auth-container">
      <div class="auth-card" style="position:relative">
        <button class="theme-toggle" style="position:absolute;top:16px;right:16px;z-index:10" title="Toggle theme"></button>
        <div class="auth-logo">
          <h1>Naija<span>Pay</span></h1>
          <p id="pageSubtitle">Create a new password for your account.</p>
        </div>
        
        <div id="infoBanner"></div>
        
        <form class="auth-form" id="resetForm">
          <input type="hidden" id="resetToken">
          <input type="hidden" id="resetEmail">
          
          <div id="emailFieldContainer"></div>
          
          <div class="form-group">
            <label class="form-label">New Password</label>
            <div class="input-group">
              <input type="password" class="form-input" id="password" placeholder="Enter new password" required minlength="6">
              <span class="password-toggle" id="togglePassword"><i class="fas fa-eye"></i></span>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <div class="input-group">
              <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm new password" required minlength="6">
              <span class="password-toggle" id="toggleConfirm"><i class="fas fa-eye"></i></span>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
            <span>Reset Password</span>
          </button>
        </form>
        
        <div class="auth-footer">
          <p>Remember your password? <a href="login.html">Login</a></p>
          <p style="margin-top:8px;"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/theme-toggle.js"></script>
  <script>
    (function() {
      // Extract token and email from URL (query string or hash fragment)
      let urlParams;
      if (window.location.hash && window.location.hash.includes('=')) {
        urlParams = new URLSearchParams(window.location.hash.slice(1));
      } else {
        urlParams = new URLSearchParams(window.location.search);
      }
      const urlToken = urlParams.get('token') || '';
      const urlEmail = urlParams.get('email') || '';

      const tokenInput = document.getElementById('resetToken');
      const emailInput = document.getElementById('resetEmail');
      const emailContainer = document.getElementById('emailFieldContainer');
      const infoBanner = document.getElementById('infoBanner');

      // Populate hidden fields if present in URL
      tokenInput.value = urlToken;
      emailInput.value = urlEmail;

      // If no email in URL, show a visible email input so the user can enter it
      if (!urlEmail) {
        emailContainer.innerHTML = `
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" id="visibleEmail" placeholder="Enter your registered email" required>
          </div>
        `;
      }

      // Handle form submission
      document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');

        // Get email: from URL hidden field, or from visible input if URL didn't have one
        let email = emailInput.value;
        if (!email) {
          const visibleEmailEl = document.getElementById('visibleEmail');
          if (visibleEmailEl) email = visibleEmailEl.value.trim();
        }

        const token = tokenInput.value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!email || !isValidEmail(email)) {
          showError('Please enter a valid email address');
          return;
        }
        if (password.length < 6) {
          showError('Password must be at least 6 characters');
          return;
        }
        if (password !== confirmPassword) {
          showError('Passwords do not match');
          return;
        }

        setLoading(btn, true);
        try {
          await api.resetPassword(token, email, password);
          showSuccess('Password reset successful! Redirecting to login...');
          setTimeout(function() {
            window.location.href = 'login.html';
          }, 2000);
        } catch (error) {
          showError(error.message || 'Failed to reset password. Please try again.');
        } finally {
          setLoading(btn, false);
        }
      });

      // Password visibility toggles
      document.getElementById('togglePassword').addEventListener('click', function() {
        const input = document.getElementById('password');
        const icon = this.querySelector('i');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
      });

      document.getElementById('toggleConfirm').addEventListener('click', function() {
        const input = document.getElementById('confirmPassword');
        const icon = this.querySelector('i');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
      });
    })();
  </script>
</body>
</html>
