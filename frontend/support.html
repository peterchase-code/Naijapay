<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - NaijaPay</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/toast.css">
</head>
<body class="dashboard-page">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><a href="dashboard.html" class="sidebar-logo">NaijaPay</a><button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button></div>
    <nav class="sidebar-nav">
      <div class="nav-section"><div class="nav-label">Main</div>
        <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> <span>Dashboard</span></a>
        <a href="credentials.html" class="nav-link"><i class="fas fa-id-card"></i> <span>Credentials</span></a>
        <a href="transactions.html" class="nav-link"><i class="fas fa-exchange-alt"></i> <span>Transactions</span></a>
        <a href="notifications.html" class="nav-link"><i class="fas fa-bell"></i> <span>Notifications</span></a>
      </div>
      <div class="nav-section"><div class="nav-label">Finance</div>
        <a href="withdrawal.html" class="nav-link"><i class="fas fa-money-bill-wave"></i> <span>Withdrawals</span></a>
        <a href="giftcards.html" class="nav-link"><i class="fas fa-gift"></i> <span>Gift Cards</span></a>
        <a href="referrals.html" class="nav-link"><i class="fas fa-users"></i> <span>Referrals</span></a>
      </div>
      <div class="nav-section"><div class="nav-label">Account</div>
        <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> <span>Settings</span></a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> <span>Profile</span></a>
        <a href="#" class="nav-link" onclick="logout();return false;"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-preview">
        <div class="user-avatar" id="sidebarAvatar"></div>
        <div class="user-info"><div class="user-name" id="sidebarName">--</div><div class="user-role">User</div></div>
      </div>
    </div>
  </aside>
  <main class="main-content">
    <header class="dashboard-header">
      <div class="header-left"><button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button><h1 class="header-title">Support</h1></div>
      <div class="header-actions">
        <a href="notifications.html" class="header-btn"><i class="fas fa-bell"></i></a>
        <button class="theme-toggle" title="Toggle theme"></button>
        <div class="header-avatar" id="headerAvatar"></div>
        <button class="header-btn" onclick="logout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>
    <div class="dashboard-content">
      <div class="grid grid-cols-2" style="gap:var(--space-xl)">
        <div class="content-card">
          <div class="content-card-header"><h3 class="content-card-title">Contact Support</h3></div>
          <div class="content-card-body">
            <form id="supportForm">
              <div class="form-group"><label class="form-label">Subject</label><input type="text" class="form-input" id="subject" placeholder="What's this about?" required></div>
              <div class="form-group"><label class="form-label">Message</label><textarea class="form-input" id="message" rows="5" placeholder="Describe your issue..." required></textarea></div>
              <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-paper-plane"></i> Send Message</button>
            </form>
          </div>
        </div>
        <div class="content-card">
          <div class="content-card-header"><h3 class="content-card-title">Quick Help</h3></div>
          <div class="content-card-body">
            <div style="display:flex;flex-direction:column;gap:var(--space-md)">
              <div class="contact-card" style="background:none;border:none;padding:0"><i class="fas fa-envelope" style="background:rgba(0,200,83,0.1)"></i><div><h3>Email</h3><p>support@naijapay.com</p></div></div>
              <div class="contact-card" style="background:none;border:none;padding:0"><i class="fas fa-phone" style="background:rgba(0,200,83,0.1)"></i><div><h3>Phone</h3><p>+234 800 123 4567</p></div></div>
              <div class="contact-card" style="background:none;border:none;padding:0"><i class="fas fa-clock" style="background:rgba(0,200,83,0.1)"></i><div><h3>Hours</h3><p>Mon - Sat, 9AM - 6PM WAT</p></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/toast.js"></script><script src="js/utils.js"></script><script src="js/avatar.js"></script>
  <script>if(!requireAuth()){};initSidebar();updateUserHeader();renderAllAvatars();setActiveNavLink();document.getElementById('supportForm')?.addEventListener('submit',(e)=>{e.preventDefault();showToast('Message sent! Our team will respond shortly.','success');document.getElementById('supportForm').reset();});</script>
  <script src="js/theme-toggle.js"></script>
</body>
</html>
