<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - NaijaPay</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/toast.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-decoration auth-decoration-1"></div>
    <div class="auth-decoration auth-decoration-2"></div>
    <div class="auth-decoration auth-decoration-3"></div>
    
    <div class="auth-container">
      <div class="auth-card" style="position:relative">
        <button class="theme-toggle" style="position:absolute;top:16px;right:16px;z-index:10" title="Toggle theme"></button>
        <div class="auth-logo">
          <h1>Naija<span>Pay</span></h1>
          <p>Create your account to start receiving payments.</p>
        </div>
        
        <div id="alertContainer"></div>
        
        <form class="auth-form" id="registerForm">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="fullName" placeholder="Enter your full name" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-input" id="username" placeholder="Choose a username" required minlength="3">
          </div>
          
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-input" id="phoneNumber" placeholder="+234..." required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Country</label>
            <select class="form-select" id="country" required>
              <option value="">Select country</option>
              <option value="Nigeria" selected>Nigeria</option>
              <option value="Ghana">Ghana</option>
              <option value="Kenya">Kenya</option>
              <option value="South Africa">South Africa</option>
              <option value="Other">Other</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label">Date of Birth</label>
            <input type="date" class="form-input" id="dateOfBirth" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-group">
              <input type="password" class="form-input" id="password" placeholder="Create a password" required minlength="6">
              <span class="password-toggle" id="togglePassword"><i class="fas fa-eye"></i></span>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
              <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm password" required>
              <span class="password-toggle" id="toggleConfirmPassword"><i class="fas fa-eye"></i></span>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Referral Code (Optional)</label>
            <input type="text" class="form-input" id="referralCode" placeholder="Enter referral code if you have one">
          </div>
          
          <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
            <span>Create Account</span>
          </button>
        </form>
        
        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Login</a></p>
          <p style="margin-top:8px;"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', handleRegister);
    
    function setupToggle(id, inputId) {
      document.getElementById(id).addEventListener('click', function() {
        const input = document.getElementById(inputId);
        const icon = this.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.remove('fa-eye');
          icon.classList.add('fa-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.remove('fa-eye-slash');
          icon.classList.add('fa-eye');
        }
      });
    }
    
    setupToggle('togglePassword', 'password');
    setupToggle('toggleConfirmPassword', 'confirmPassword');
  </script>
  <script src="js/theme-toggle.js"></script>
</body>
</html>
