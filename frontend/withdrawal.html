<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdrawal - NaijaPay</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/toast.css">
</head>
<body class="dashboard-page">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="dashboard.html" class="sidebar-logo">NaijaPay</a>
      <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Main</div>
        <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> <span>Dashboard</span></a>
        <a href="credentials.html" class="nav-link"><i class="fas fa-id-card"></i> <span>Credentials</span></a>
        <a href="transactions.html" class="nav-link"><i class="fas fa-exchange-alt"></i> <span>Transactions</span></a>
        <a href="notifications.html" class="nav-link"><i class="fas fa-bell"></i> <span>Notifications</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Finance</div>
        <a href="withdrawal.html" class="nav-link active"><i class="fas fa-money-bill-wave"></i> <span>Withdrawals</span></a>
        <a href="giftcards.html" class="nav-link"><i class="fas fa-gift"></i> <span>Gift Cards</span></a>
        <a href="referrals.html" class="nav-link"><i class="fas fa-users"></i> <span>Referrals</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Account</div>
        <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> <span>Settings</span></a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> <span>Profile</span></a>
        <a href="#" class="nav-link" onclick="logout();return false;"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-preview">
        <div class="user-avatar" id="sidebarAvatar"></div>
        <div class="user-info">
          <div class="user-name" id="sidebarName">--</div>
          <div class="user-role">User</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="dashboard-header">
      <div class="header-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
        <h1 class="header-title">Withdraw Funds</h1>
      </div>
      <div class="header-actions">
        <a href="notifications.html" class="header-btn"><i class="fas fa-bell"></i></a>
        <button class="theme-toggle" title="Toggle theme"></button>
        <div class="header-avatar" id="headerAvatar"></div>
        <button class="header-btn" onclick="logout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>

    <div class="dashboard-content">
      <div class="grid grid-cols-2" style="gap: var(--space-xl)">
        <div class="content-card">
          <div class="content-card-header">
            <h3 class="content-card-title">Request Withdrawal</h3>
          </div>
          <div class="content-card-body">
            <div id="alertContainer"></div>
            <div class="balance-card" style="margin-bottom: var(--space-lg); padding: var(--space-lg)">
              <div class="balance-label">Available Balance</div>
              <div class="balance-value" id="balanceValue" style="font-size: var(--text-2xl)">&#8358;0</div>
            </div>
            <form id="withdrawalForm">
              <div class="form-group">
                <label class="form-label">Amount</label>
                <input type="number" class="form-input" id="amount" placeholder="Enter amount in Naira" required min="1" step="1">
              </div>
              <div class="form-group">
                <label class="form-label">
                  <input type="checkbox" id="useSavedBank" checked style="margin-right: var(--space-sm)">
                  Use saved bank details
                </label>
              </div>
              <div id="manualBankFields" style="display:none">
                <div class="form-group">
                  <label class="form-label">Bank Name</label>
                  <input type="text" class="form-input" id="bankName" placeholder="Enter bank name">
                </div>
                <div class="form-group">
                  <label class="form-label">Account Name</label>
                  <input type="text" class="form-input" id="accountName" placeholder="Enter account name">
                </div>
                <div class="form-group">
                  <label class="form-label">Account Number</label>
                  <input type="text" class="form-input" id="accountNumber" placeholder="Enter account number">
                </div>
                <div class="form-group">
                  <label class="form-label">Country</label>
                  <input type="text" class="form-input" id="country" placeholder="Country">
                </div>
                <div class="form-group">
                  <label class="form-label">Currency</label>
                  <select class="form-select" id="currency">
                    <option value="NGN" selected>NGN - Nigerian Naira</option>
                  </select>
                </div>
              </div>
              <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Submit Withdrawal Request
              </button>
            </form>
            <div id="savedBankInfo" style="margin-top: var(--space-md)"></div>
          </div>
        </div>

        <div class="content-card">
          <div class="content-card-header">
            <h3 class="content-card-title">Withdrawal History</h3>
          </div>
          <div class="content-card-body">
            <div id="withdrawalsContainer">
              <div class="empty-state">
                <div class="empty-state-icon"><i class="fas fa-history"></i></div>
                <h3>No Withdrawals</h3>
                <p>Your withdrawal history will appear here.</p>
              </div>
            </div>
            <div class="pagination" id="pagination"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/avatar.js"></script>
  <script src="js/withdrawal.js"></script>
  <script>
    if (!requireAuth()) {};
    initSidebar();
    updateUserHeader();
    renderAllAvatars();
    setActiveNavLink();
    initWithdrawalPage();
  </script>
  <script src="js/theme-toggle.js"></script>
</body>
</html>
