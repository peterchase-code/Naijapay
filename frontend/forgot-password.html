<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - NaijaPay</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/toast.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-decoration auth-decoration-1"></div>
    <div class="auth-decoration auth-decoration-2"></div>
    <div class="auth-decoration auth-decoration-3"></div>
    
    <div class="auth-container">
      <div class="auth-card" style="position:relative">
        <button class="theme-toggle" style="position:absolute;top:16px;right:16px;z-index:10" title="Toggle theme"></button>
        <div class="auth-logo">
          <h1>Naija<span>Pay</span></h1>
          <p>Reset your password.</p>
        </div>
        
        <div id="alertContainer"></div>
        
        <form class="auth-form" id="forgotForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" id="email" placeholder="Enter your registered email" required>
          </div>
          
          <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
            <span>Send Reset Link</span>
          </button>
        </form>
        
        <div class="auth-footer">
          <p>Remember your password? <a href="login.html">Login</a></p>
          <p style="margin-top:8px;"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/theme-toggle.js"></script>
  <script>
    (function() {
      // Detect development / localhost mode
      const isLocal = window.location.hostname === 'localhost' ||
                      window.location.hostname === '127.0.0.1' ||
                      window.location.protocol === 'file:';

      document.getElementById('forgotForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const email = document.getElementById('email').value.trim();

        if (!email || !isValidEmail(email)) {
          showError('Please enter a valid email address');
          return;
        }

        setLoading(btn, true);

        try {
          // Build frontend URL for the reset link
          let frontendUrl;
          if (window.location.protocol === 'file:') {
            frontendUrl = window.API_HOST || 'http://localhost:3000';
          } else {
            frontendUrl = window.location.origin;
          }

          const res = await api.forgotPassword(email, frontendUrl);

          // In local dev mode with no SMTP, display the reset URL directly on the page
          if (isLocal && res && res.data && res.data.resetUrl) {
            document.getElementById('alertContainer').innerHTML = `
              <div style="margin-bottom:16px;">
                <div class="alert" style="background:rgba(0,200,83,0.1);border-left:4px solid #00C853;color:#166534;">
                  <i class="fas fa-flask"></i>
                  <span><strong>Dev Mode:</strong> SMTP not configured. Use the link below to test.</span>
                </div>
              </div>
              <div style="padding:16px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;margin-bottom:16px;">
                <p style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">Click this link to open the reset page:</p>
                <a href="${res.data.resetUrl}" style="color:#00C853;font-size:12px;word-break:break-all;font-family:monospace;display:block;margin-bottom:12px;">${res.data.resetUrl}</a>
                <a href="${res.data.resetUrl}" class="btn btn-primary btn-sm">Open Reset Page</a>
              </div>
            `;
            document.getElementById('forgotForm').style.display = 'none';
          } else {
            showSuccess('If this email exists in our system, you will receive reset instructions.');
            document.getElementById('forgotForm').reset();
          }
        } catch (error) {
          console.error('Forgot password error:', error);
          showError(error.message || 'Failed to send reset email. Please try again.');
        } finally {
          setLoading(btn, false);
        }
      });
    })();
  </script>
</body>
</html>
