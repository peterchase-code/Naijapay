<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NaijaPay</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/toast.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-decoration auth-decoration-1"></div>
    <div class="auth-decoration auth-decoration-2"></div>
    <div class="auth-decoration auth-decoration-3"></div>
    
    <div class="auth-container">
      <div class="auth-card" style="position:relative">
        <button class="theme-toggle" style="position:absolute;top:16px;right:16px;z-index:10" title="Toggle theme"></button>
        <div class="auth-logo">
          <h1>Naija<span>Pay</span></h1>
          <p>Welcome back! Login to your account.</p>
        </div>
        
        <div id="alertContainer"></div>
        
        <form class="auth-form" id="loginForm">
          <div class="form-group">
            <label class="form-label">Email or Username</label>
            <div class="input-group">
              <input type="text" class="form-input" id="login" placeholder="Enter email or username" required>
              <i class="fas fa-user input-icon" style="right:auto;left:12px;transform:translateY(-50%);"></i>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-group">
              <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
              <span class="password-toggle" id="togglePassword"><i class="fas fa-eye"></i></span>
            </div>
          </div>
          
          <div class="remember-forgot">
            <label class="remember-me">
              <input type="checkbox" id="rememberMe">
              <span>Remember me</span>
            </label>
            <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
          </div>
          
          <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
            <span>Login</span>
          </button>
        </form>
        
        <div class="auth-footer">
          <p>Don't have an account? <a href="register.html">Register</a></p>
          <p style="margin-top:8px;"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
    document.getElementById('togglePassword').addEventListener('click', function() {
      const input = document.getElementById('password');
      const icon = this.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });
  </script>
  <script src="js/theme-toggle.js"></script>
</body>
</html>
