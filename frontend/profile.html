<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - NaijaPay</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/toast.css">
</head>
<body class="dashboard-page">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><a href="dashboard.html" class="sidebar-logo">NaijaPay</a><button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button></div>
    <nav class="sidebar-nav">
      <div class="nav-section"><div class="nav-label">Main</div>
        <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> <span>Dashboard</span></a>
        <a href="credentials.html" class="nav-link"><i class="fas fa-id-card"></i> <span>Credentials</span></a>
        <a href="transactions.html" class="nav-link"><i class="fas fa-exchange-alt"></i> <span>Transactions</span></a>
        <a href="notifications.html" class="nav-link"><i class="fas fa-bell"></i> <span>Notifications</span></a>
      </div>
      <div class="nav-section"><div class="nav-label">Finance</div>
        <a href="withdrawal.html" class="nav-link"><i class="fas fa-money-bill-wave"></i> <span>Withdrawals</span></a>
        <a href="giftcards.html" class="nav-link"><i class="fas fa-gift"></i> <span>Gift Cards</span></a>
        <a href="referrals.html" class="nav-link"><i class="fas fa-users"></i> <span>Referrals</span></a>
      </div>
      <div class="nav-section"><div class="nav-label">Account</div>
        <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> <span>Settings</span></a>
        <a href="profile.html" class="nav-link active"><i class="fas fa-user"></i> <span>Profile</span></a>
        <a href="#" class="nav-link" onclick="logout();return false;"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-preview">
        <div class="user-avatar" id="sidebarAvatar"></div>
        <div class="user-info"><div class="user-name" id="sidebarName">--</div><div class="user-role">User</div></div>
      </div>
    </div>
  </aside>
  <main class="main-content">
    <header class="dashboard-header">
      <div class="header-left"><button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button><h1 class="header-title">My Profile</h1></div>
      <div class="header-actions">
        <a href="notifications.html" class="header-btn"><i class="fas fa-bell"></i></a>
        <button class="theme-toggle" title="Toggle theme"></button>
        <div class="header-avatar" id="headerAvatar"></div>
        <button class="header-btn" onclick="logout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>
    <div class="dashboard-content">
      <div class="content-card" style="max-width:600px;margin:0 auto">
        <div class="content-card-body" style="text-align:center;padding:var(--space-2xl)">
          <div class="user-avatar" id="profileAvatar" style="width:100px;height:100px;font-size:var(--text-3xl);margin:0 auto var(--space-lg);display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--gradient-primary);color:white;font-weight:700">--</div>
          <h2 id="profileName" style="margin-bottom:var(--space-xs)">--</h2>
          <p id="profileUsername" style="color:var(--text-muted);margin-bottom:var(--space-lg)">@username</p>
          <div class="divider"></div>
          <div class="user-detail-grid" style="text-align:left;margin-top:var(--space-lg)">
            <div class="user-detail-item"><div class="user-detail-label">Email</div><div class="user-detail-value" id="profileEmail">--</div></div>
            <div class="user-detail-item"><div class="user-detail-label">Phone</div><div class="user-detail-value" id="profilePhone">--</div></div>
            <div class="user-detail-item"><div class="user-detail-label">Country</div><div class="user-detail-value" id="profileCountry">--</div></div>
            <div class="user-detail-item"><div class="user-detail-label">Date of Birth</div><div class="user-detail-value" id="profileDOB">--</div></div>
            <div class="user-detail-item"><div class="user-detail-label">Referral Code</div><div class="user-detail-value" id="profileRefCode">--</div></div>
            <div class="user-detail-item"><div class="user-detail-label">Member Since</div><div class="user-detail-value" id="profileDate">--</div></div>
          </div>
          <div style="margin-top:var(--space-xl)"><a href="settings.html" class="btn btn-primary"><i class="fas fa-edit"></i> Edit Profile</a></div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/toast.js"></script><script src="js/utils.js"></script><script src="js/avatar.js"></script>
  <script>if(!requireAuth()){};initSidebar();updateUserHeader();renderAllAvatars();setActiveNavLink();(async()=>{try{const r=await api.getMe();const u=r.data;document.getElementById('profileName').textContent=u.fullName;document.getElementById('profileUsername').textContent='@'+u.username;document.getElementById('profileEmail').textContent=u.email;document.getElementById('profilePhone').textContent=u.phoneNumber;document.getElementById('profileCountry').textContent=u.country;document.getElementById('profileDOB').textContent=u.dateOfBirth?new Date(u.dateOfBirth).toLocaleDateString():'--';document.getElementById('profileRefCode').textContent=u.referralCode||'--';document.getElementById('profileDate').textContent=u.createdAt?new Date(u.createdAt).toLocaleDateString():'--';const i=getInitials(u.fullName||u.username);document.getElementById('profileAvatar').textContent=i;}catch(e){console.error(e);}})();</script>
  <script src="js/theme-toggle.js"></script>
</body>
</html>
